		<script>
		(() => {
			const base = location.origin;
			const protocol = location.protocol;
			const sw = navigator.serviceWorker;
			function createLink(rel, href, as) {
				const link = document.createElement("link");
				link.rel = rel;
				link.href = href;
				if (as) {
					link.as = as;
					link.crossOrigin = "";
				}
				document.head.append(link);
			}
			if (protocol.includes("http") && !sw.controller) {
				createLink("preload", "./font.woff2", "font");
			}
			if (protocol === "https:") {
				createLink("manifest", `data:application/manifest+json,${encodeURIComponent(
					JSON.stringify({
						"background_color": "#000",
						"description": "A backwards working memory task.",
						"display": "standalone",
						"icons": [{
							"purpose": "any maskable",
							"sizes": "any",
							"src": `${base}/3/icon.svg`,
							"type": "image/svg+xml"
						}],
						"id": `${base}/3/`,
						"name": "Backwards - JFO",
						"short_name": "Backwards",
						"start_url": `${base}/3/`,
						"theme_color": "#000"
					})
				)}`);
				addEventListener("load", () => sw.register("./sw.js"), {once: true});
			}
		})();
		</script>

		<script>
		addEventListener("DOMContentLoaded", () => {
			"use strict";
			const lang = {
				ctrl: {
					0: "X",
					1: "Color"
				},
				error: {
					0: "No speech API",
					1: "Unsound value"
				},
				ol: {
					0: "Start task on the circle",
					1: "Note sequence of stimuli",
					2: "Recall the order backwards",
					3: "Abort task on the red X"
				},
				res: {
					0: "No Match",
					1: "Well Played",
					2: "Level",
					3: "Memory",
					4: "Good",
					5: "Great",
					6: "Super"
				}
			};
			const config = settings,
				audio = new AudioContext(),
				auto = {
					down: 0,
					range: config.autoUp + 1,
					up: 0
				},
				[board, head] = [document.body, document.head],
				speech = window.speechSynthesis,
				tasks = ["char", "color"],
				wake = async () => {
					wakeReq = await navigator.wakeLock.request("screen");
				};
			let block, count, delay, input, limit,
				speakStm, stimuli, timer, wakeReq,
				tsk = "char";
			function $(sel, el = board) {
				return el.querySelector(sel);
			}
			function create(tag, parent) {
				const el = document.createElement(tag);
				if (parent) {
					parent.append(el);
				}
				return el;
			}
			function error(txt, terminate = true) {
				const el = create("div", board);
				el.className = "error";
				el.textContent = `[${txt}]`;
				if (terminate) {
					throw new Error(txt);
				}
			}
			function ocillate(props) {
				if (!config.sound) {
					return;
				}
				const p = {...{
					gain: 0.2,
					ramp: true,
					start: 0,
					wave: "sine"
				}, ...props};
				const o = new OscillatorNode(audio, {
					frequency: p.freq,
					type: p.wave
				});
				const g = new GainNode(audio, {
					gain: p.gain
				});
				g.gain.setValueAtTime(p.gain, audio.currentTime + p.start + 0.01);
				if (p.ramp) {
					g.gain.exponentialRampToValueAtTime(
						0.0001,
						audio.currentTime + p.stop
					);
				}
				o.connect(g).connect(audio.destination);
				o.start(audio.currentTime + p.start);
				o.stop(audio.currentTime + p.stop);
			}
			function playPress() {
				ocillate({
					freq: 540,
					stop: 0.1
				});
			}
			function playAlert() {
				let [a, b] = [0, 13];
				const inc = 9;
				while (b < 68) {
					ocillate({
						freq: 1600,
						start: a / 100,
						stop: b / 100
					});
					a += inc;
					b += inc;
				}
			}
			function playBuzzer() {
				ocillate({
					freq: 140,
					gain: 0.18,
					ramp: false,
					stop: 0.6,
					wave: "sawtooth"
				});
			}
			function speak(stm, vol = 1) {
				if (!speech) {
					return;
				}
				const req = new SpeechSynthesisUtterance(stm);
				req.lang = navigator.language;
				req.rate = 1.1;
				req.volume = vol;
				speech.speak(req);
			}
			function ctrl(el, func, txt) {
				let active;
				if (txt) {
					el.textContent = txt;
				}
				el.addEventListener("pointerdown", () => {
					playPress();
					el.classList.add("active");
					active = true;
					board.addEventListener("pointerup", () => {
						el.classList.remove("active");
						active = false;
					}, {once: true});
				});
				el.addEventListener("pointerup", () => {
					if (active) {
						el.classList.remove("active");
						active = false;
						func(el);
					}
				});
			}
			function initVal(x = config.limitMin) {
				[limit, auto.up, auto.down] = [x, 0, 0];
			}
			function init() {
				initVal();
				board.style.setProperty("--time", `${config.timeStimulus / 1000}s`);
				if (config.nightMode) {
					board.className = "night-mode";
				}
				board.addEventListener("pointerdown", (e) => e.preventDefault());
				board.addEventListener("touchend", (e) => e.preventDefault()); //iOS
				main();
				if (!speech) {
					error(lang.error[0], false);
				}
			}
			function prep() {
				[...board.children].forEach((el) => el.remove());
			}
			function main() {
				const clone = $("#tmpl-1", head).content.cloneNode(true);
				function clean() {
					initVal();
					$(".result")?.remove();
				}
				function setX(prssd) {
					if (prssd) {
						if (config.autoUp >= auto.range) {
							config.autoUp = 1;
						} else {
							config.autoUp += 1;
						}
						clean();
					}
					return (
						auto.up > 0
						? `${auto.up} / ${config.autoUp}`
						: `${lang.ctrl[0]} ${config.autoUp}`
					);
				}
				function setAlt(prssd) {
					if (prssd) {
						tsk = tasks.find((t) => tsk !== t);
						clean();
						$(".x").textContent = setX();
					}
					return (
						tsk === "color"
						? lang.ctrl[1]
						: config.alphanumeric
						? "A-9"
						: "0-9"
					);
				}
				function help(el) {
					if (!el.firstChild.nodeValue) {
						el.textContent = "?";
						return;
					}
					el.firstChild.replaceWith(create("ol"));
					Object.values(lang.ol).forEach((txt) => {
						create("li", el.firstChild).textContent = txt;
					});
				}
				function speaker(prssd) {
					if (prssd) {
						config.sound = !config.sound;
					}
					return (
						config.sound
						? "🔊"
						: "🔇"
					);
				}
				function nightMode() {
					config.nightMode = !config.nightMode;
					board.classList.toggle("night-mode", config.nightMode);
				}
				function fullscreen() {
					if (document.fullscreenElement) {
						document.exitFullscreen();
					} else {
						board.requestFullscreen();
					}
				}
				prep();
				ctrl(
					$(".x", clone),
					(el) => {
						el.textContent = setX(true);
					},
					setX()
				);
				ctrl(
					$(".alt", clone),
					(el) => {
						el.textContent = setAlt(true);
					},
					setAlt()
				);
				ctrl(
					$(".help", clone),
					help,
					"?"
				);
				ctrl(
					$(".circle", clone),
					run
				);
				ctrl(
					$(".speaker", clone),
					(el) => {
						el.textContent = speaker(true);
					},
					speaker()
				);
				ctrl(
					$(".mode", clone),
					nightMode
				);
				ctrl(
					$(".screen", clone),
					fullscreen
				);
				if (!document.fullscreenEnabled) {
					$(".screen", clone).className = "none";
				}
				[input, limit, result.true] = [[], (
					limit > 99
					? config.limitMin
					: limit
				), false];
				board.append(clone);
			}
			function build() {
				let stm;
				const [s, stim, qty] = [[], [], config.qty[tsk]];
				const random = (a) => a.splice(
					Math.floor(Math.random() * a.length),
					1
				)[0];
				({
					char() {
						const a = [...new Array(10).keys()].map((inc) => 48 + inc);
						if (config.alphanumeric) {
							a.push(...[...new Array(26).keys()].map((inc) => 65 + inc));
							while (a.length > qty) {
								random(a);
							}
						} else {
							a.push(a.shift());
						}
						stimuli = a.map((cp) => `"${String.fromCodePoint(cp)}"`);
						speakStm = true;
					},
					color() {
						stimuli = [
							"#157717", "#d82727", "#3131d3", "#d6c918",
							"#8a008a", "#d56e2a", "#7d6040", "#56a",
							"#63cfc4", "#42be42", "#fff", "#bb63ad"
						];
						speakStm = false;
					}
				})[tsk]();
				if (qty < stimuli.length) {
					stimuli.length = qty;
				}
				stim.push(...stimuli);
				stm = random(stim);
				function ptrn(a, b) {
					const [cp1, cp2] = [a.codePointAt(1), b.codePointAt(1)];
					return cp1 + 1 === cp2 || cp1 - 1 === cp2;
				}
				while (s.push(stm) < limit) {
					while (
						stm === s.at(-1) ||
						(tsk === "char" && ptrn(stm, s.at(-1)))
					) {
						stm = random(stim);
						if (!stim.length) {
							stim.push(...stimuli);
						}
					}
				}
				return s;
			}
			function panel() {
				let li;
				let [i, b] = [0, 0];
				const pnl = $(".panel");
				const [stim, btns] = [[...block.reverse()], [...stimuli]];
				const setBtn = (
					tsk === "color"
					? () => btns.splice(Math.floor(Math.random() * btns.length), 1)[0]
					: () => btns.shift()
				);
				const blank = config.qty[tsk] % config.columns;
				const size = (
					blank
					? config.qty[tsk] + config.columns - blank
					: config.qty[tsk]
				);
				function btn(el) {
					if (result.true) {
						return;
					}
					const stm = el.style.getPropertyValue("--stm");
					const wrong = stm !== stim.shift();
					if (input.push(stm) === limit || wrong) {
						result(wrong);
					}
				}
				pnl.style.setProperty("--clms", config.columns);
				while (i < size) {
					li = create("li", pnl);
					if (
						b < stimuli.length &&
						!(blank && config.columns === 3 && i === size - 3)
					) {
						li.style.setProperty("--stm", setBtn());
						li.className = tsk;
						ctrl(
							li,
							btn
						);
						b += 1;
					}
					i += 1;
				}
			}
			function clear() {
				clearTimeout(delay);
				clearInterval(timer);
				speech?.cancel();
				wakeReq?.release();
			}
			function state(sq) {
				if (count === limit) {
					clear();
					sq.remove();
					panel();
					return;
				}
				const stm = block[count];
				count += 1;
				if (document.hidden) {
					return;
				}
				sq.addEventListener("animationend", () => {
					sq.classList.remove(tsk);
				}, {once: true});
				requestAnimationFrame(() => {
					sq.classList.add(tsk);
					sq.style.setProperty("--stm", stm);
					if (config.sound && speakStm) {
						speak(stm.replace(/"/g, ""));
					} else {
						speak(" ", 0); //iOS
					}
				});
			}
			function run() {
				const clone = $("#tmpl-2", head).content.cloneNode(true);
				const sq = $(".sq", clone);
				prep();
				ctrl(
					$(".esc", clone),
					() => {
						clear();
						initVal();
						main();
					}
				);
				count = 0;
				board.append(clone);
				if (config.qty[tsk] < 6) {
					error(lang.error[1]);
				}
				block = build();
				speak(" ", 0);
				wake();
				delay = setTimeout(() => {
					state(sq);
					timer = setInterval(() => state(sq), config.timeRate);
				}, 1500);
			}
			function result(wrong) {
				const clone = $("#tmpl-3", head).content.cloneNode(true);
				const ul = [...$(".result", clone).children];
				const [b, i] = [block.length, input.length];
				function trimEnd(t) {
					block.length = t;
					block.push(`"..."`);
				}
				function trimStart(t) {
					[block, input].forEach((a) => {
						a.splice(0, t);
						a.unshift(`"..."`);
					});
				}
				result.true = true;
				setTimeout(() => {
					if (wrong) {
						auto.down += 1;
						if (block.length > 10) {
							if (i < 7) {
								trimEnd(10);
							} else if (i < b - 5) {
								trimEnd(i + 4);
								trimStart(i - 6);
							} else {
								trimStart(b - 10);
							}
						}
						ul[0].textContent = `- ${lang.res[0]} -`;
						ul[1].classList.add("match");
						ul[1].style.setProperty("--match", block.length);
						[...block, ...input].forEach((stm) => {
							const el = create("span", ul[1]);
							el.style.setProperty("--stm", stm);
							el.className = (
								stm.includes(".")
								? "char"
								: tsk
							);
						});
						ul[2].className = "none";
						if (
							auto.down === config.autoDown &&
							limit !== config.limitMin
						) {
							limit -= 1;
							initVal(limit);
						}
						playBuzzer();
						auto.up = 0;
					} else {
						auto.up += 1;
						[
							`- ${lang.res[1]} -`,
							`${lang.res[2]}: ${limit}`,
							`${lang.res[3]}: ${
								limit < 5
								? lang.res[4]
								: limit < 8
								? lang.res[5]
								: lang.res[6]
							}`
						].forEach((txt, i) => {
							ul[i].textContent = txt;
						});
						if (auto.up === config.autoUp) {
							ul[1].className = "complete";
							limit += 1;
							initVal(limit);
						}
						playAlert();
						auto.down = 0;
					}
					main();
					board.append(clone);
				}, 150);
			}
			init();
		}, {once: true});
		</script>
		<template id="tmpl-1">
			<p class="x"></p>
			<div class="speaker"></div>
			<p class="alt"></p>
			<p class="help"></p>
			<div class="circle"></div>
			<div class="ctrlstack">
				<div class="mode"></div>
				<div class="screen"></div>
			</div>
		</template>
		<template id="tmpl-2">
			<div class="sq"></div>
			<ul class="panel"></ul>
			<div class="esc"></div>
		</template>
		<template id="tmpl-3">
			<ul class="result">
				<li></li>
				<li></li>
				<li></li>
			</ul>
		</template>
	</head>
	<body></body>
</html>
