<!doctype html>

		<script defer src="./config.js"></script>
		<script>
		(() => {
			const base = location.origin;
			const protocol = location.protocol;
			const sw = navigator.serviceWorker;
			function createLink(rel, href, as) {
				const link = document.createElement("link");
				link.rel = rel;
				link.href = href;
				if (as) {
					link.as = as;
					link.crossOrigin = "";
				}
				document.head.append(link);
			}
			if (protocol.includes("http") && !sw.controller) {
				createLink("preload", "./font.woff2", "font");
			}
			if (protocol === "https:") {
				createLink("manifest", `data:application/manifest+json,${encodeURIComponent(
					JSON.stringify({
						"background_color": "#000",
						"description": "A limited hold working memory task.",
						"display": "standalone",
						"icons": [{
							"purpose": "any maskable",
							"sizes": "any",
							"src": `${base}/1/icon.svg`,
							"type": "image/svg+xml"
						}],
						"id": `${base}/1/`,
						"name": "Limited Hold - JFO",
						"short_name": "Limited Hold",
						"start_url": `${base}/1/`,
						"theme_color": "#000"
					})
				)}`);
				addEventListener("load", () => sw.register("./sw.js"), {once: true});
			}
		})();
		</script>

		<script>
		addEventListener("DOMContentLoaded", () => {
			"use strict";
			const lang = {
				ctrl: {
					0: "X",
					1: "Esc"
				},
				menu: {
					0: "Easy",
					1: "Medium",
					2: "Hard"
				},
				ol: {
					0: "Choose difficulty",
					1: "Start task on the circle",
					2: "Observe stimuli",
					3: "Press the right order"
				},
				res: {
					0: "Rotten Luck",
					1: "Well Played",
					2: " sec"
				}
			};
			const config = settings,
				audio = new AudioContext(),
				[board, head] = [document.body, document.head],
				tasks = ["arrow", "char"],
				[xyMax, xyMin] = [8, 5];
			let block, count, hold, idx, limit, prevHold,
				prevTsk, score, time1, time2,
				tsk = "char";
			function $(sel, el = board) {
				return el.querySelector(sel);
			}
			function create(tag, parent) {
				const el = document.createElement(tag);
				if (parent) {
					parent.append(el);
				}
				return el;
			}
			function ocillate(props) {
				if (!config.sound) {
					return;
				}
				const p = {...{
					gain: 0.2,
					ramp: true,
					start: 0,
					wave: "sine"
				}, ...props};
				const o = new OscillatorNode(audio, {
					frequency: p.freq,
					type: p.wave
				});
				const g = new GainNode(audio, {
					gain: p.gain
				});
				g.gain.setValueAtTime(p.gain, audio.currentTime + p.start + 0.01);
				if (p.ramp) {
					g.gain.exponentialRampToValueAtTime(
						0.0001,
						audio.currentTime + p.stop
					);
				}
				o.connect(g).connect(audio.destination);
				o.start(audio.currentTime + p.start);
				o.stop(audio.currentTime + p.stop);
			}
			function playPress() {
				ocillate({
					freq: 540,
					stop: 0.1
				});
			}
			function playAlert() {
				let [a, b] = [0, 13];
				const inc = 9;
				while (b < 68) {
					ocillate({
						freq: 1600,
						start: a / 100,
						stop: b / 100
					});
					a += inc;
					b += inc;
				}
			}
			function playBuzzer() {
				ocillate({
					freq: 140,
					gain: 0.18,
					ramp: false,
					stop: 0.6,
					wave: "sawtooth"
				});
			}
			function ctrl(el, func, txt) {
				let active;
				if (txt) {
					el.textContent = txt;
				}
				el.addEventListener("pointerdown", () => {
					playPress();
					el.classList.add("active");
					active = true;
					board.addEventListener("pointerup", () => {
						el.classList.remove("active");
						active = false;
					}, {once: true});
				});
				el.addEventListener("pointerup", () => {
					if (active) {
						el.classList.remove("active");
						active = false;
						func(el);
					}
				});
			}
			function init() {
				matchMedia("(orientation: portrait)").addEventListener("change", () => {
					if (board.classList.contains("task")) {
						block.forEach((sq) => {
							const a = sq.style.gridArea.split("/");
							sq.style.gridArea = `${a[1]}/${a[0]}`;
						});
					}
				});
				if (config.nightMode) {
					board.className = "night-mode";
				}
				board.addEventListener("pointerdown", (e) => e.preventDefault());
				board.addEventListener("touchend", (e) => e.preventDefault()); //iOS
				main();
			}
			function prep() {
				[...board.children].forEach((el) => el.remove());
			}
			function main() {
				const clone = $("#tmpl-1", head).content.cloneNode(true);
				function help(el) {
					if (!el.firstChild.nodeValue) {
						el.textContent = "?";
						return;
					}
					el.firstChild.replaceWith(create("ol"));
					Object.values(lang.ol).forEach((txt) => {
						create("li", el.firstChild).textContent = txt;
					});
				}
				function setAlt(prssd) {
					if (prssd) {
						tsk = tasks.find((t) => tsk !== t);
					}
					return (
						tsk === "char"
						? "!"
						: "!!"
					);
				}
				function menu(el) {
					hold = el.dataset.hold;
					base();
				}
				function speaker(prssd) {
					if (prssd) {
						config.sound = !config.sound;
					}
					return (
						config.sound
						? "🔊"
						: "🔇"
					);
				}
				function nightMode() {
					config.nightMode = !config.nightMode;
					board.classList.toggle("night-mode", config.nightMode);
				}
				function fullscreen() {
					if (document.fullscreenElement) {
						document.exitFullscreen();
					} else {
						board.requestFullscreen();
					}
				}
				prep();
				ctrl(
					$(".help", clone),
					help,
					"?"
				);
				ctrl(
					$(".alt", clone),
					(el) => {
						el.textContent = setAlt(true);
					},
					setAlt()
				);
				[...$(".menu", clone).children].forEach((li, i) => {
					ctrl(
						li,
						menu,
						lang.menu[i]
					);
				});
				ctrl(
					$(".speaker", clone),
					(el) => {
						el.textContent = speaker(true);
					},
					speaker()
				);
				ctrl(
					$(".mode", clone),
					nightMode
				);
				ctrl(
					$(".screen", clone),
					fullscreen
				);
				if (!document.fullscreenEnabled) {
					$(".screen", clone).className = "none";
				}
				[score, count] = [0, 0];
				board.classList.remove(`mask-${config.maskID[tsk]}`);
				board.append(clone);
			}
			function base() {
				const clone = $("#tmpl-2", head).content.cloneNode(true);
				const circle = $(".circle", clone);
				function setX(prssd) {
					if (prssd) {
						if (limit < config.limitMax) {
							limit += 1;
						} else {
							limit = config.limitMin;
						}
						[score, count] = [0, 0];
						$(".result")?.remove();
					} else if (prevHold !== hold || prevTsk !== tsk) {
						[limit, prevHold, prevTsk] = [config.limitMin, hold, tsk];
					}
					return `${lang.ctrl[0]} ${limit}`;
				}
				prep();
				ctrl(
					$(".x", clone),
					(el) => {
						el.textContent = setX(true);
					},
					setX()
				);
				ctrl(
					$(".esc", clone),
					main,
					lang.ctrl[1]
				);
				ctrl(
					circle,
					run
				);
				if (/^(alt|und)/.test(config.reverse[tsk])) {
					if (!idx?.length) {
						config.reverse[tsk] = (
							config.reverse[tsk]
							? undefined
							: "alternate"
						);
					}
					circle.classList.add("marker");
					circle.classList.toggle("reverse", !!config.reverse[tsk]);
				}
				board.classList.add(`mask-${config.maskID[tsk]}`);
				board.append(clone);
			}
			function build() {
				let [v1, v2] = [1, 0];
				const columns = (
					innerWidth > innerHeight
					? xyMax
					: xyMin
				);
				const areas = Array.from(
					{length: xyMin * xyMax},
					() => {
						if (v2 === columns) {
							v1 += 1;
							v2 = 0;
						}
						v2 += 1;
						return `${v1}/${v2}`;
					}
				);
				block = [];
				function createSq(stm) {
					const sq = create("div");
					sq.className = tsk;
					sq.style.gridArea = areas.splice(
						Math.floor(Math.random() * areas.length),
						1
					)[0];
					sq.style.setProperty("--stm", stm);
					block.push(sq);
				}
				({
					arrow() {
						const sect = Math.round(360 / limit * 100) / 100;
						let deg;
						let [s, i] = [sect, 0];
						if (config.randomize[tsk]) {
							s -= 4;
							deg = () => Math.round(s - Math.floor(
								Math.random() * (sect - 7)
							));
						} else {
							deg = () => Math.round(s - sect / 2);
						}
						while (i < limit) {
							createSq(`${deg()}deg`);
							s += sect;
							i += 1;
						}
					},
					char() {
						const [codePoint, qty] = (
							config.alphanumeric === "alpha"
							? [65, 26]
							: config.limitMax < 10
							? [49, 9]
							: [48, 10]
						);
						const a = [...new Array(
							config.limitMax < qty
							? config.limitMax
							: qty
						).keys()].map((inc) => codePoint + inc);
						if (limit > qty) {
							limit = qty;
						}
						if (config.randomize[tsk]) {
							while (a.length > limit) {
								a.splice(Math.floor(Math.random() * a.length), 1);
							}
						} else {
							a.length = limit;
						}
						a.forEach((cp) => createSq(`"${String.fromCodePoint(cp)}"`));
					}
				})[tsk]();
				if (config.reverse[tsk]) {
					block.reverse();
				}
			}
			function unmask(e, sq = e.target.closest(".mask")) {
				if (!sq) {
					return;
				}
				sq.className = "";
				if (block.indexOf(sq) !== idx.shift() || !idx.length) {
					board.removeEventListener("pointerdown", unmask);
					result(sq);
				} else {
					playPress();
				}
			}
			function mask() {
				block.forEach((sq) => {
					sq.className = "mask";
				});
				time2 = performance.now();
				board.addEventListener("pointerdown", unmask);
				count += 1;
			}
			function trigger(e) {
				const sq = e.target.closest("div");
				if (!sq) {
					return;
				}
				board.removeEventListener("pointerdown", trigger);
				mask();
				unmask(e, sq);
			}
			function run() {
				prep();
				idx = [...new Array(limit).keys()];
				board.classList.add("task");
				build();
				board.append(...block);
				time1 = performance.now();
				if (config.time[hold]) {
					setTimeout(mask, config.time[hold]);
				} else {
					board.addEventListener("pointerdown", trigger);
				}
			}
			function result(sq) {
				let delay = 0;
				const clone = $("#tmpl-3", head).content.cloneNode(true);
				const data = [];
				if (idx.length) {
					delay = 800;
					sq.classList.add("wrong", tsk);
					data.push(`- ${lang.res[0]} -`);
					playBuzzer();
				} else {
					score += 1;
					data.push(`- ${lang.res[1]} -`);
					playAlert();
				}
				data.push(
					`${Math.round((score / count) * 100)}% (${score} / ${count})`,
					`${Math.round((time2 - time1) / 10) / 100}${lang.res[2]}`
				);
				data.forEach((txt, i) => {
					clone.children[0].children[i].textContent = txt;
				});
				setTimeout(() => {
					board.classList.remove("task");
					base();
					board.append(clone);
				}, delay);
			}
			init();
		}, {once: true});
		</script>
		<template id="tmpl-1">
			<p class="help"></p>
			<div class="speaker"></div>
			<p class="alt"></p>
			<ul class="menu">
				<li data-hold="0"></li>
				<li data-hold="1"></li>
				<li data-hold="2"></li>
			</ul>
			<div class="ctrlstack">
				<div class="mode"></div>
				<div class="screen"></div>
			</div>
		</template>
		<template id="tmpl-2">
			<div class="preload mask"></div>
			<p class="x"></p>
			<p class="esc"></p>
			<div class="circle"></div>
		</template>
		<template id="tmpl-3">
			<ul class="result">
				<li></li>
				<li></li>
				<li></li>
			</ul>
		</template>
	</head>
	<body></body>
</html>
