		<script>
		(() => {
			const base = location.origin;
			const protocol = location.protocol;
			const sw = navigator.serviceWorker;
			function createLink(rel, href, as) {
				const link = document.createElement("link");
				link.rel = rel;
				link.href = href;
				if (as) {
					link.as = as;
					link.crossOrigin = "";
				}
				document.head.append(link);
			}
			if (protocol.includes("http") && !sw.controller) {
				createLink("preload", "./font.woff2", "font");
			}
			if (protocol === "https:") {
				createLink("manifest", `data:application/manifest+json,${encodeURIComponent(
					JSON.stringify({
						"background_color": "#000",
						"description": "A dual n-back working memory task.",
						"display": "standalone",
						"icons": [{
							"purpose": "any maskable",
							"sizes": "any",
							"src": `${base}/2/icon.svg`,
							"type": "image/svg+xml"
						}],
						"id": `${base}/2/`,
						"name": "Dual N-back - JFO",
						"short_name": "Dual N-back",
						"start_url": `${base}/2/`,
						"theme_color": "#000"
					})
				)}`);
				addEventListener("load", () => sw.register("./sw.js"), {once: true});
			}
		})();

		<script>
		addEventListener("DOMContentLoaded", () => {
			"use strict";
			const lang = {
				btns: {
					0: "A",
					1: "L",
					2: "Buttons",
					3: " On",
					4: " Off"
				},
				ctrl: {
					0: "N",
					1: "X"
				},
				error: {
					0: "No speech API",
					1: "Unsound value"
				},
				ol: {
					0: "Start task on the circle",
					1: "Find repeats of N states back",
					2: "Visual press A, aural press L",
					3: "End task on the center cross"
				},
				res: {
					0: "Index",
					1: "Block",
					2: "Average",
					3: "Next up",
					4: " back",
					5: "Targets",
					6: "Non-targets"
				}
			};
			const config = settings,
				V = {
					block: [],
					bool: false
				},
				A = {
					block: [],
					bool: false
				},
				audio = new AudioContext(),
				auto = {
					circle: false,
					count: 0,
					mode: false,
					sum: 0
				},
				[board, head] = [document.body, document.head],
				speech = window.speechSynthesis,
				wake = async () => {
					wakeReq = await navigator.wakeLock.request("screen");
				};
			let count, cursorOff, delay, idx, prevTargets,
				targets, timer, trials, wakeReq,
				N = config.limitMin;
			function $(sel, el = board) {
				return el.querySelector(sel);
			}
			function create(tag, parent) {
				const el = document.createElement(tag);
				if (parent) {
					parent.append(el);
				}
				return el;
			}
			function error(txt, terminate = true) {
				const el = create("div", board);
				el.className = "error";
				el.textContent = `[${txt}]`;
				if (terminate) {
					throw new Error(txt);
				}
			}
			function ocillate(props) {
				if (!config.sound) {
					return;
				}
				const p = {...{
					gain: 0.2,
					ramp: true,
					start: 0,
					wave: "sine"
				}, ...props};
				const o = new OscillatorNode(audio, {
					frequency: p.freq,
					type: p.wave
				});
				const g = new GainNode(audio, {
					gain: p.gain
				});
				g.gain.setValueAtTime(p.gain, audio.currentTime + p.start + 0.01);
				if (p.ramp) {
					g.gain.exponentialRampToValueAtTime(
						0.0001,
						audio.currentTime + p.stop
					);
				}
				o.connect(g).connect(audio.destination);
				o.start(audio.currentTime + p.start);
				o.stop(audio.currentTime + p.stop);
			}
			function playPress() {
				ocillate({
					freq: 540,
					stop: 0.1
				});
			}
			function playAlert() {
				let [a, b] = [0, 13];
				const inc = 9;
				while (b < 68) {
					ocillate({
						freq: 1600,
						start: a / 100,
						stop: b / 100
					});
					a += inc;
					b += inc;
				}
			}
			function speak(stm, vol = 1) {
				if (!speech) {
					return;
				}
				const req = new SpeechSynthesisUtterance(stm);
				req.lang = navigator.language;
				req.rate = 1.1;
				req.volume = vol;
				speech.speak(req);
			}
			function ctrl(el, func, txt) {
				let active;
				if (txt) {
					el.textContent = txt;
				}
				el.addEventListener("pointerdown", () => {
					playPress();
					el.classList.add("active");
					active = true;
					board.addEventListener("pointerup", () => {
						el.classList.remove("active");
						active = false;
					}, {once: true});
				});
				el.addEventListener("pointerup", () => {
					if (active) {
						el.classList.remove("active");
						active = false;
						func(el);
					}
				});
			}
			function setTrials() {
				trials = config.base + N;
			}
			function init() {
				const grid = $("#tmpl-0", head).content;
				const keyDwn = {
					KeyA() {
						btn(V.bool, "V");
					},
					KeyB() {
						if (!board.classList.contains("task")) {
							config.buttons = !config.buttons;
							btns();
						}
					},
					KeyL() {
						if (config.sound) {
							btn(A.bool, "A");
						}
					},
					Space() {
						if (auto.circle) {
							run();
						} else {
							toggle();
						}
					}
				};
				function toggle() {
					if (board.classList.contains("task")) {
						clear();
						board.removeEventListener("mousemove", cursor);
						clearTimeout(cursorOff);
						board.classList.remove("task", "no-cursor");
						main();
					} else {
						run();
					}
				}
				ctrl(
					$(".center", grid),
					toggle
				);
				[auto.mode, auto.count] = [false, 0];
				setTrials();
				board.style.setProperty("--time", `${config.timeStimulus / 1000}s`);
				if (config.nightMode) {
					board.className = "night-mode";
				}
				board.addEventListener("keydown", (e) => {
					if (!e.repeat && Object.hasOwn(keyDwn, e.code)) {
						keyDwn[e.code]();
					}
				});
				board.addEventListener("pointerdown", (e) => e.preventDefault());
				board.addEventListener("touchend", (e) => e.preventDefault()); //iOS
				board.append(grid);
				main();
				if (!speech) {
					error(lang.error[0], false);
				}
			}
			function prep() {
				[...board.children].slice(1).forEach((el) => el.remove());
			}
			function main() {
				const clone = $("#tmpl-1", head).content.cloneNode(true);
				function setN(prssd) {
					if (prssd) {
						if (N >= config.limitMax) {
							N = config.limitMin;
						} else {
							N += 1;
						}
						setTrials();
					}
					return `${lang.ctrl[0]} ${N}`;
				}
				function setX(prssd) {
					if (prssd) {
						auto.mode = !auto.mode;
					}
					return `${lang.ctrl[1]} ${
						auto.mode
						? config.blocks
						: 1
					}`;
				}
				function help(el) {
					if (!el.firstChild.nodeValue) {
						el.textContent = "?";
						return;
					}
					el.firstChild.replaceWith(create("ol"));
					Object.values(lang.ol).forEach((txt) => {
						create("li", el.firstChild).textContent = txt;
					});
				}
				function speaker(prssd) {
					if (prssd) {
						config.sound = !config.sound;
					}
					return (
						config.sound
						? "🔊"
						: "🔇"
					);
				}
				function nightMode() {
					config.nightMode = !config.nightMode;
					board.classList.toggle("night-mode", config.nightMode);
				}
				function fullscreen() {
					if (document.fullscreenElement) {
						document.exitFullscreen();
					} else {
						board.requestFullscreen();
					}
				}
				prep();
				ctrl(
					$(".n", clone),
					(el) => {
						el.textContent = setN(true);
					},
					setN()
				);
				ctrl(
					$(".x", clone),
					(el) => {
						el.textContent = setX(true);
					},
					setX()
				);
				ctrl(
					$(".help", clone),
					help,
					"?"
				);
				ctrl(
					$(".speaker", clone),
					(el) => {
						el.textContent = speaker(true);
					},
					speaker()
				);
				ctrl(
					$(".mode", clone),
					nightMode
				);
				ctrl(
					$(".screen", clone),
					fullscreen
				);
				if (!document.fullscreenEnabled) {
					$(".screen", clone).className = "none";
				}
				[auto.count, auto.sum] = [0, 0];
				board.append(clone);
			}
			function build(stim, olap) {
				let stm;
				let [i, t, trg] = [0, 0, []];
				const s = new Array(trials);
				const sample = () => stim[Math.floor(Math.random() * stim.length)];
				if (olap) {
					trg = prevTargets.splice(0, config.overlap);
				} else {
					idx = [...new Array(config.base).keys()].map((inc) => N + inc);
				}
				while (trg.length < config.targets) {
					trg.push(idx.splice(
						Math.floor(Math.random() * idx.length),
						1
					)[0]);
				}
				prevTargets = trg;
				trg.sort((a, b) => a - b);
				while (i < config.targets) {
					t = trg[i];
					stm = sample();
					while (stm === s[t - N * 2]) {
						stm = sample();
					}
					if (s[t - N]) {
						stm = s[t - N];
					}
					[s[t - N], s[t]] = [stm, stm];
					i += 1;
				}
				i = 0;
				while (i < trials) {
					while (!s[i]) {
						stm = sample();
						if (stm !== s[i - N] && stm !== s[i + N]) {
							s[i] = stm;
						}
					}
					i += 1;
				}
				return s;
			}
			function btn(match, id) {
				if (!btn.fired || btn.fired[id]) {
					return;
				}
				if (match) {
					btn[id][0] += 1;
				} else {
					btn[id][1] += 1;
				}
				btn.fired[id] = true;
			}
			function btns() {
				const clone = $("#tmpl-2", head).content.cloneNode(true);
				const ul = [...$(".btns", clone).children];
				$("div.btns")?.remove();
				if (board.classList.contains("task") && !auto.circle) {
					ctrl(
						ul[0],
						() => btn(V.bool, "V"),
						lang.btns[0]
					);
					ctrl(
						ul[1],
						() => btn(A.bool, "A"),
						lang.btns[1]
					);
					if (!config.sound) {
						ul[1].className = "none";
					}
					board.append(clone);
				}
				if (!board.classList.contains("task")) {
					const el = create("div", board);
					el.className = "btns btns-toggle";
					el.textContent = `${lang.btns[2]}${
						config.buttons
						? lang.btns[3]
						: lang.btns[4]
					}`;
				}
			}
			function cursor(e) {
				board.classList.remove("no-cursor");
				clearTimeout(cursorOff);
				if (e.target === board) {
					cursorOff = setTimeout(() => {
						board.classList.add("no-cursor")
					}, 1200);
				}
			}
			function clear() {
				clearTimeout(delay);
				clearInterval(timer);
				$(".visual", $(".grid"))?.dispatchEvent(new Event("animationend"));
				speech?.cancel();
				wakeReq?.release();
			}
			function state() {
				if (count === trials) {
					clear();
					result();
					return;
				}
				const vStm = V.block[count];
				const aStm = A.block[count];
				const sq = $(vStm);
				V.bool = vStm === V.block[count - N];
				A.bool = aStm === A.block[count - N];
				btn.fired = {
					A: false,
					V: false
				};
				count += 1;
				if (document.hidden) {
					return;
				}
				sq.addEventListener("animationend", () => {
					sq.classList.remove("visual");
				}, {once: true});
				requestAnimationFrame(() => {
					sq.classList.add("visual");
					if (config.sound) {
						speak(aStm);
					}
				});
			}
			function run() {
				prep();
				[btn.V, btn.A, count, auto.circle] = [[0, 0], [0, 0], 0, false];
				delete btn.fired;
				board.classList.add("task");
				if (config.buttons) {
					btns();
				} else {
					board.classList.add("no-cursor");
					board.addEventListener("mousemove", cursor);
				}
				targets = (
					config.sound
					? config.targets * 2
					: config.targets
				);
				if (
					N + targets - (
						config.overlapCtrl
						? config.overlap
						: 0
					) > trials
				) {
					error(lang.error[1]);
				}
				V.block = build([
					".s-1", ".s-2", ".s-3", ".s-4",
					".s-5", ".s-6", ".s-7", ".s-8"
				]);
				A.block = build(config.aural, config.overlapCtrl);
				speak(" ", 0);
				wake();
				delay = setTimeout(() => {
					state();
					timer = setInterval(state, config.timeRate);
				}, 2100);
			}
			function result() {
				const clone = $("#tmpl-3", head).content.cloneNode(true);
				const [rV, wV, rA, wA] = [
					btn.V[0], btn.V[1],
					btn.A[0], btn.A[1]
				];
				const diff = (rV + rA) - (wV + wA);
				const data = [
					`${lang.res[0]}: ${
						diff > 0
						? Math.round((diff / targets) * 100)
						: 0
					}%`
				];
				if (auto.mode) {
					auto.count += 1;
					auto.sum += N;
					if (auto.count !== config.blocks) {
						const circle = $(".circle", clone);
						const [mV, mA] = [
							config.targets - rV + wV,
							config.targets - rA + wA
						];
						if (
							mV < config.autoUp && (
								config.sound
								? mA < config.autoUp
								: true
							)
						) {
							N += 1;
						} else if (
							N > config.limitMin &&
							(mV > config.autoDown || mA > config.autoDown)
						) {
							N -= 1;
						}
						setTrials();
						$(".btns")?.remove();
						ctrl(
							circle,
							run
						);
						circle.classList.remove("none");
						auto.circle = true;
					}
					data.push(
						`${lang.res[1]}: ${auto.count} / ${config.blocks}`,
						`${
							auto.count === config.blocks
							? `${lang.res[2]}: ${Math.round(auto.sum / config.blocks)}`
							: `${lang.res[3]}: ${N}`
						}${lang.res[4]}`
					);
				} else {
					data.push(
						`${lang.res[5]}: ${rV + rA} / ${targets}`,
						`${lang.res[6]}: ${wV + wA}`
					);
				}
				data.forEach((txt, i) => {
					clone.children[0].children[i].textContent = txt;
				});
				if (!document.hidden) {
					playAlert();
				}
				board.append(clone);
			}
			init();
		}, {once: true});
		</script>
		<template id="tmpl-0">
			<div class="grid">
				<div class="sq s-1"></div>
				<div class="sq s-2"></div>
				<div class="sq s-3"></div>
				<div class="sq s-4"></div>
				<div class="center"></div>
				<div class="sq s-5"></div>
				<div class="sq s-6"></div>
				<div class="sq s-7"></div>
				<div class="sq s-8"></div>
			</div>
		</template>
		<template id="tmpl-1">
			<p class="n"></p>
			<div class="speaker"></div>
			<p class="x"></p>
			<p class="help"></p>
			<div class="ctrlstack">
				<div class="mode"></div>
				<div class="screen"></div>
			</div>
		</template>
		<template id="tmpl-2">
			<ul class="btns">
				<li></li>
				<li></li>
			</ul>
		</template>
		<template id="tmpl-3">
			<ul class="result">
				<li></li>
				<li></li>
				<li></li>
			</ul>
			<div class="circle none"></div>
		</template>
	</head>
	<body></body>
</html>
